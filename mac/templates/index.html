<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Manager</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>Claude Code Manager</h1>

    <div class="status-card">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="status-text">
        <span id="statusLabel">確認中...</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-start" onclick="action('start')">&#9654; 全起動</button>
      <button class="btn btn-stop" onclick="action('stop')">&#9632; 全停止</button>
      <button class="btn btn-restart" onclick="action('restart')">&#8635; 再起動</button>
    </div>

    <div class="config-section">
      <label for="sessionCount">セッション数</label>
      <select id="sessionCount" onchange="updateConfig()">
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="7">7</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="links">
      <a href="https://claude.ai" target="_blank" class="link-btn">claude.ai を開く</a>
    </div>

    <div class="pid-section" id="pidSection" style="display:none">
      <h3>稼働中のセッション</h3>
      <ul id="pidList"></ul>
    </div>
  </div>

  <script>
    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const indicator = document.getElementById('statusIndicator');
        const label = document.getElementById('statusLabel');
        const pidSection = document.getElementById('pidSection');
        const pidList = document.getElementById('pidList');

        label.textContent = `${data.running} / ${data.total} 稼働中`;

        if (data.running === 0) {
          indicator.className = 'status-indicator off';
        } else if (data.running < data.total) {
          indicator.className = 'status-indicator partial';
        } else {
          indicator.className = 'status-indicator on';
        }

        if (data.pids.length > 0) {
          pidSection.style.display = 'block';
          pidList.innerHTML = data.pids.map(pid =>
            `<li>PID: ${pid}</li>`
          ).join('');
        } else {
          pidSection.style.display = 'none';
        }
      } catch (e) {
        document.getElementById('statusLabel').textContent = '接続エラー';
        document.getElementById('statusIndicator').className = 'status-indicator off';
      }
    }

    async function fetchConfig() {
      try {
        const res = await fetch('/api/config');
        const data = await res.json();
        document.getElementById('sessionCount').value = data.session_count;
      } catch (e) {}
    }

    async function action(name) {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '処理中...';
      try {
        await fetch(`/api/${name}`, { method: 'POST' });
        setTimeout(fetchStatus, 3000);
      } catch (e) {
        alert('エラーが発生しました');
      } finally {
        setTimeout(() => {
          btn.disabled = false;
          if (name === 'start') btn.innerHTML = '&#9654; 全起動';
          if (name === 'stop') btn.innerHTML = '&#9632; 全停止';
          if (name === 'restart') btn.innerHTML = '&#8635; 再起動';
        }, 3000);
      }
    }

    async function updateConfig() {
      const count = document.getElementById('sessionCount').value;
      await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_count: parseInt(count) })
      });
    }

    fetchStatus();
    fetchConfig();
    setInterval(fetchStatus, 10000);
  </script>
</body>
</html>
